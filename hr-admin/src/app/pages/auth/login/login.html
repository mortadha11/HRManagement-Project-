<div class="login-wrapper">

  <!-- Left Side — Branding -->
  <div class="login-left">
    <div class="brand">
      <div class="brand-icon">👥</div>
      <h1 class="brand-name">HR<span>Management</span></h1>
      <p class="brand-desc">Gérez vos ressources humaines efficacement</p>
    </div>
    <div class="brand-features">
      <div class="feature"><span class="feature-icon">✅</span><span>Gestion des employés</span></div>
      <div class="feature"><span class="feature-icon">✅</span><span>Suivi des congés</span></div>
      <div class="feature"><span class="feature-icon">✅</span><span>Gestion des contrats</span></div>
      <div class="feature"><span class="feature-icon">✅</span><span>Tableaux de bord</span></div>
    </div>
  </div>

  <!-- Right Side — Login Form -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-header">
        <div class="avatar">👤</div>
        <h2>Bienvenue</h2>
        <p>Connectez-vous à votre compte</p>
      </div>

      <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              id="username"
              type="text"
              name="username"
              [(ngModel)]="credentials.username"
              placeholder="votre username"
              required
              class="form-input"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="credentials.password"
              placeholder="••••••••"
              required
              class="form-input"
            />
            <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          ⚠️ {{ errorMessage }}
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading || loginForm.invalid">
          <span *ngIf="!isLoading">Se connecter →</span>
          <span *ngIf="isLoading">Connexion en cours...</span>
        </button>

      </form>
    </div>
  </div>

</div>
